<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

</head>
<style>
    
table {
        border-collapse: collapse;
        margin: auto;

        width: 80%;
       
    }
    tr:nth-child(odd){
        background-color:black;
        color: white;
    }

    th, td {
        border: 1px solid #000;
        text-align: center;
    }

    th {
        
        font-weight: bold;

    }

    .left {
        text-align: left;
    }
    .right{
        text-align: right;
    }
</style>
</head>

<body>
    <table>
        <tr>
            <th rowspan="2">No</th>
            <th rowspan="2">Student Name</th>
            <th rowspan="2">Gender</th>
            <th rowspan="2">Roll No.</th>
            <th colspan="3">Marks</th>
        </tr>
        <tr>
            <th>Myanmar</th>
            <th>English</th>
            <th>Maths</th>
        </tr>

        <tr>
            <td>1</td>
            <td class="left">Su Su</td>
            <td rowspan="2">Female</td>
            <td>5CS-32</td>
            <td class="right">60</td>
            <td class="right">75</td>
            <td class="right">86</td>
        </tr>

        <tr>
            <td>2</td>
            <td class="left">Moe Moe</td>
            <td>5CS-33</td>
            <td class="right">78</td>
            <td class="right">86</td>
            <td class="right">84</td>
        </tr>

        <tr>
            <td>3</td>
            <td class="left">Kyaw Kyaw</td>
            <td rowspan="3">Male</td>
            <td>5CS-34</td>
            <td class="right">89</td>
            <td class="right">43</td>
            <td class="right">86</td>
        </tr>

        <tr>
            <td>4</td>
            <td class="left">Mg Mg</td>
            <td>5CS-35</td>
            <td class="right">76</td>
            <td class="right">75</td>
            <td class="right">75</td>
        </tr>

        <tr>
            <td>5</td>
            <td class="left">Aung Aung</td>
            <td>5CS-36</td>
            <td class="right">87</td>
            <td class="right">75</td>
            <td class="right">86</td>
        </tr>
    </table>
</body>
</html>
