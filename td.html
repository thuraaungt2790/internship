<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>

  <title>Hero Section</title>
</head>

<body class="bg-[#0f172a] min-h-screen flex items-center justify-center text-white">

  <div class="text-center">

    <!-- Badge -->
    <div class="inline-block px-5 py-2 rounded-full bg-white/10 border border-white/20 mb-6">
      🚀 Now in Beta
    </div>

    <!-- Title -->
    <h1 class="text-6xl font-bold leading-tight">
      Ship faster with
      <span class="bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
        modern tooling
      </span>
    </h1>

    <!-- Paragraph -->
    <p class="text-gray-300 mt-6 text-lg">
      Build, deploy, and scale your applications with ease.
    </p>

    <!-- Buttons -->
    <div class="mt-8 flex justify-center gap-5">

      <button class="bg-blue-600 hover:bg-blue-700 px-8 py-3 rounded-xl font-semibold shadow-lg shadow-blue-500/40">
        Get Started
      </button>

      <button class="bg-white/10 border border-white/20 px-8 py-3 rounded-xl font-semibold">
        Learn More
      </button>

    </div>

  </div>

</body>
</html>
